# Prometheus configuration for RAG Enterprise
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'rag-enterprise'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # ============================================================================
  # Prometheus self-monitoring
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ============================================================================
  # RAG Enterprise API
  # ============================================================================
  - job_name: 'rag-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8001']
        labels:
          service: 'rag-api'
          component: 'backend'
    scrape_interval: 10s
    scrape_timeout: 5s

  # ============================================================================
  # PostgreSQL Exporter (optional - requires postgres_exporter)
  # ============================================================================
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         service: 'postgresql'
  #         component: 'database'

  # ============================================================================
  # Redis Exporter (optional - requires redis_exporter)
  # ============================================================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'
  #         component: 'cache'

  # ============================================================================
  # Node Exporter (system metrics - optional)
  # ============================================================================
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'node-exporter'
  #         component: 'system'
