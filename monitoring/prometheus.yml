# Prometheus configuration for RAG Enterprise

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'rag-enterprise'
    environment: 'production'

# Scrape configurations
scrape_configs:
  - job_name: 'rag-enterprise-api'
    static_configs:
      - targets: ['fastapi:8000']
        labels:
          service: 'api'
          component: 'main'

    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Additional services
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: 'vectordb'
          component: 'qdrant'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'cache'
          component: 'redis'

# Alerting rules
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Rule files
rule_files:
  - '/etc/prometheus/rules/*.yml'
