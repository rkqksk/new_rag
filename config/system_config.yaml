agents:
  crawler_scheduler:
    config:
      schedule: 0 */6 * * *
      targets_file: ./config/crawl_targets.json
    role: 자동 크롤링
  quality_monitor:
    config:
      evaluation_interval: 3600
      metrics:
      - relevance
      - accuracy
      - latency
    role: RAG 품질 모니터링
  workflow_orchestrator:
    config:
      batch_size: 10
      max_workers: 4
      retry_attempts: 3
      timeout: 300
    role: 파이프라인 조정
architecture:
  layers:
  - components:
    - admin_dashboard
    - user_portal
    name: UI/UX
  - components:
    - teacher_student_llm
    - prompt_chain
    - knowledge_distillation
    name: Orchestration
  - components:
    - vector_db
    - semantic_search
    - reranking
    name: RAG Retrieval
  - components:
    - upload
    - crawler
    - preprocessing
    - auto_labeling
    name: Data Ingestion
  - components:
    - llm_api
    - web_search
    - container_orchestration
    name: Infrastructure
development_status:
  current_phase: 1
  phase_1:
    completed:
    - RAG 파이프라인 설계
    - Docker 환경 구축
    - FastAPI 컨테이너화
    - 기본 API 구현
    - Health Check
    in_progress:
    - Teacher-Student LLM 구조
    - 워크플로우 오케스트레이션
    - 상담 시스템
    status: in_progress
  total_phases: 5
docker:
  network:
    name: rag_network
    subnet: 172.28.0.0/16
  services:
    fastapi:
      cpu: 2
      ip: 172.28.0.7
      memory: 4G
      ports:
      - 8000
      role: API 서버
    n8n:
      cpu: 2
      ip: 172.28.0.5
      memory: 3G
      ports:
      - 5678
      role: 워크플로우
    ollama:
      cpu: 4
      ip: 172.28.0.6
      memory: 8G
      ports:
      - 11434
      role: 로컬 LLM
    postgres:
      cpu: 2
      ip: 172.28.0.4
      memory: 4G
      ports:
      - 5432
      role: 메타데이터
    qdrant:
      cpu: 2
      ip: 172.28.0.2
      memory: 4G
      ports:
      - 6333
      - 6334
      role: 벡터 검색
    redis:
      cpu: 1
      ip: 172.28.0.3
      memory: 2G
      ports:
      - 6379
      role: 캐싱
documentation:
  architecture: docs/ARCHITECTURE.md
  dev_environment: DEV_ENVIRONMENT.md
  mcp_agents: docs/MCP_AGENTS.md
  operations: docs/OPERATIONS.md
  project_structure: PROJECT_STRUCTURE_RULES.md
  roadmap: docs/ROADMAP.md
  tech_stack: docs/TECH_STACK.md
last_sync: '2025-10-18T17:31:33.930506'
llm:
  students:
  - backend: Transformers
    context_window: 8192
    model: gemma-3-1B
    name: student_1
    roles:
    - 실시간 서비스
    - 간단한 질의 응답
  - backend: MLX
    context_window: 16384
    model: Qwen 2.5-3B
    name: student_2
    roles:
    - 추천/검색
    - 중간 복잡도 작업
  teacher:
    backend: MLX
    context_window: 32768
    model: Qwen 2.5-7B
    roles:
    - 고품질 응답 생성
    - 지식 증류
    - 복잡한 추론
mcp_servers:
  docker:
  - qdrant
  - redis
  - postgres
  - n8n
  - ollama
  python:
  - name: filesystem
    script: mcp_servers/filesystem_server.py
  - name: claude_haiku
    script: mcp_servers/claude_haiku_server.py
  - name: qdrant_server
    script: mcp_servers/qdrant_server.py
  - name: ollama_server
    script: mcp_servers/ollama_server.py
monitoring:
  alerting:
    critical:
    - system_downtime
    - data_loss
    - security_breach
    info:
    - daily_statistics
    - model_performance
    warning:
    - processing_delay_5min
    - memory_usage_80pct
    - error_rate_5pct
  prometheus:
    enabled: true
    metrics:
    - documents_processed_total
    - embedding_duration_seconds
    - search_relevance_score
    - system_health_status
    port: 9090
operations:
  clean_deploy:
    enabled: true
    script: scripts/clean_deploy.sh
    steps:
    - remove_dev_code
    - delete_test_data
    - disable_debug_logs
    - apply_production_config
    - run_security_audit
  deployment:
    auto_rollback:
      enabled: true
      error_threshold: 0.1
    rollout: progressive
    strategy: blue_green
security:
  authentication:
    method: JWT
    refresh_expiry: 604800
    token_expiry: 86400
  authorization:
    model: RBAC
    roles:
    - super_admin
    - internal
    - client
  encryption:
    storage: AES-256-GCM
    transport: TLS 1.3
  rate_limiting:
    admin: 1000
    anonymous: 10
    authenticated: 100
source: CLAUDE.md
tech_stack:
  databases:
    cache: Redis 7.2
    document: MongoDB 7.0
    metadata: PostgreSQL 15
    vector: Qdrant 1.7
  embedding_models:
    image:
      fallback: CLIP-ViT-L-14
      primary: OpenCLIP-ViT-H-14
    text:
      fallback: multilingual-e5-large
      korean: KoE5-base
      primary: gte-Qwen2-7B-instruct
  ml_frameworks:
    embedding: sentence-transformers 2.2
    finetuning: PEFT + LoRA
    nlp: Transformers 4.36
    vision: OpenCLIP 2.0
  parsers:
    excel:
    - Pandas
    - SQLite
    - Text2SQL
    image:
    - EasyOCR
    - CLIP
    - BLIP-2
    - OpenCV
    pdf:
    - Docling
    - TableTransformer
    - Camelot
    - Tabula
  runtime:
    async: asyncio
    framework: FastAPI
    python: '3.11'
version: '2.2'
