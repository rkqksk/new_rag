services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rag_enterprise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"  # Changed to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"  # Changed to avoid conflict with local Redis
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "16333:6333"  # Changed to avoid conflict with local/SSH Qdrant
      - "16334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    ports:
      - "8001:8001"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
    depends_on:
      - postgres
      - redis
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
