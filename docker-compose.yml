# =============================================================================
# RAG Enterprise Docker Compose - Development Configuration
# =============================================================================
# This is the base configuration optimized for local development with:
# - Hot-reload for code changes
# - Debug logging
# - Development-appropriate resource limits
# - Health checks for all services
# - Volume mounts for persistence and development
#
# Usage:
#   Development: docker-compose up -d
#   Staging:     docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d
# =============================================================================

version: '3.8'

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  rag_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------
services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres
    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rag_enterprise}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      rag_network:
        ipv4_address: 172.28.0.4

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag_enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: rag-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000

    volumes:
      - redis_data:/data

    networks:
      rag_network:
        ipv4_address: 172.28.0.3

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Qdrant Vector Database
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: rag-qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      rag_network:
        ipv4_address: 172.28.0.2

    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Prometheus Monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: rag-prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'

    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    networks:
      rag_network:
        ipv4_address: 172.28.0.8

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # FastAPI Application (Development Mode)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: rag-api
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      # Application Settings
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DEBUG: ${DEBUG:-true}

      # Service Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}

      # Database Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rag_enterprise}

      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TTL: ${REDIS_TTL:-3600}

      # Qdrant Configuration
      QDRANT_HOST: qdrant
      QDRANT_HTTP_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-30}

      # Embedding Configuration
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}

      # LLM Configuration
      OLLAMA_HOST: ${OLLAMA_HOST:-localhost}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-qwen2.5:7b-instruct-q4_K_M}

      # Security Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      # API Keys (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Monitoring
      PROMETHEUS_PORT: 9090
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}

    volumes:
      # Mount source code for hot-reload (development only)
      - ./app:/app/app:ro
      - ./agents:/app/agents:ro
      # Mount data directory for product images and print areas
      - ./data:/app/data
      # Mount logs for debugging
      - ./logs:/app/logs

    networks:
      rag_network:
        ipv4_address: 172.28.0.7

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      prometheus:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

# -----------------------------------------------------------------------------
# Configuration Summary
# -----------------------------------------------------------------------------
# Services:
#   - postgres:    172.28.0.4:5432  (Database)
#   - redis:       172.28.0.3:6379  (Cache)
#   - qdrant:      172.28.0.2:6333  (Vector DB)
#   - prometheus:  172.28.0.8:9090  (Monitoring)
#   - api:         172.28.0.7:8000  (FastAPI Application)
#
# Resource Allocation (Development):
#   - PostgreSQL: 512MB-2GB, 0.5-2 CPUs
#   - Redis:      256MB-1GB, 0.25-1 CPUs
#   - Qdrant:     512MB-2GB, 0.5-2 CPUs
#   - Prometheus: 256MB-1GB, 0.25-1 CPUs
#   - API:        512MB-2GB, 0.5-2 CPUs
#   Total:        ~2.5GB-8GB, 2-8 CPUs
#
# Health Checks:
#   All services have liveness probes with appropriate start periods
#
# Volumes:
#   All data persisted to named volumes for durability
# -----------------------------------------------------------------------------
