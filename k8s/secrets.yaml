apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag-enterprise
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_PASSWORD: "changeme_in_production"

  # Redis (optional)
  REDIS_PASSWORD: ""

  # Google Drive (base64 encoded credentials.json)
  GOOGLE_DRIVE_CREDENTIALS: ""

  # AWS S3
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # API Keys (if needed)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
