apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-enterprise-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-enterprise-api

  # Scaling range
  minReplicas: 3
  maxReplicas: 20

  # Metrics for scaling decisions
  metrics:

  # CPU-based scaling (target 70% CPU usage)
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # Memory-based scaling (target 80% memory usage)
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  # Custom metric: Requests per second (if metrics-server available)
  # - type: Pods
  #   pods:
  #     metric:
  #       name: http_requests_per_second
  #     target:
  #       type: AverageValue
  #       averageValue: "1000"

  # Scaling behavior (how aggressively to scale)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 60s before scaling up
      policies:
      - type: Percent
        value: 100  # Scale up by 100% (double pods)
        periodSeconds: 60
      - type: Pods
        value: 4    # Or add 4 pods
        periodSeconds: 60
      selectPolicy: Max  # Use whichever adds more pods

    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
      - type: Percent
        value: 50   # Scale down by 50% max
        periodSeconds: 60
      - type: Pods
        value: 2    # Or remove 2 pods max
        periodSeconds: 60
      selectPolicy: Min  # Use whichever removes fewer pods

---
# KEDA ScaledObject (alternative to HPA for event-driven scaling)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rag-enterprise-api-keda
spec:
  scaleTargetRef:
    name: rag-enterprise-api

  minReplicaCount: 3
  maxReplicaCount: 20

  # Cool-down periods
  pollingInterval: 30
  cooldownPeriod: 300

  triggers:

  # Redis queue length (if using message queues)
  - type: redis
    metadata:
      address: redis-service:6379
      listName: task_queue
      listLength: "10"

  # Prometheus metrics (if available)
  - type: prometheus
    metadata:
      serverAddress: http://prometheus:9090
      metricName: http_requests_total
      threshold: "1000"
      query: |
        sum(rate(http_requests_total{app="rag-enterprise"}[2m]))

  # CPU (similar to HPA)
  - type: cpu
    metricType: Utilization
    metadata:
      value: "70"

  # Memory (similar to HPA)
  - type: memory
    metricType: Utilization
    metadata:
      value: "80"
