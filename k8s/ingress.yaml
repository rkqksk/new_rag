apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-enterprise-ingress
  namespace: rag-enterprise
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/websocket-services: "rag-api-service"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: rag-api-service
            port:
              number: 8001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rag-api-service
            port:
              number: 8001
