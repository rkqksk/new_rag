apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-enterprise-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/websocket-services: "rag-enterprise-api-service"
spec:
  ingressClassName: nginx
  rules:
  - host: rag-enterprise.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: rag-enterprise-api-service
            port:
              number: 80
