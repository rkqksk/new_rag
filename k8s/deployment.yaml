apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-enterprise-api
  labels:
    app: rag-enterprise
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-enterprise
      component: api
  template:
    metadata:
      labels:
        app: rag-enterprise
        component: api
    spec:
      containers:
      - name: api
        image: rag-enterprise-api:latest
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
