apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-enterprise-api
  labels:
    app: rag-enterprise
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-enterprise
      component: api
  template:
    metadata:
      labels:
        app: rag-enterprise
        component: api
    spec:
      containers:
      - name: api
        image: rag-enterprise:latest
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: QDRANT_HOST
          value: "qdrant-service"
        - name: QDRANT_PORT
          value: "6333"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: OLLAMA_HOST
          value: "ollama-service"
        - name: OLLAMA_PORT
          value: "11434"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-enterprise-api
spec:
  selector:
    app: rag-enterprise
    component: api
  ports:
  - port: 8001
    targetPort: 8001
    name: http
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-enterprise-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-enterprise-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
