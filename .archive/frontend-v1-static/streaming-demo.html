<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket/SSE Streaming Demo - v6.0.0</title>
    <link rel="stylesheet" href="/css/design-system.css?v=20251115">
    <style>
        body {
            padding: 2rem;
            background-color: hsl(var(--muted) / 0.3);
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .mode-btn {
            padding: 0.75rem 1rem;
            background-color: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
            border: 2px solid hsl(var(--border));
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s ease;
            text-align: center;
        }

        .mode-btn:hover {
            background-color: hsl(var(--accent));
        }

        .mode-btn.active {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border-color: hsl(var(--primary));
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .controls .input {
            flex: 1;
        }

        .status-bar {
            padding: 0.75rem 1rem;
            background-color: hsl(var(--muted));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }

        .status-bar.active {
            background-color: hsl(142.1 76.2% 96.3%);
            color: hsl(142.1 76.2% 36.3%);
            border-color: hsl(142.1 76.2% 86.3%);
        }

        .output-container {
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 1rem;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .event {
            margin-bottom: 1rem;
            padding: 0.75rem;
            background-color: hsl(var(--muted));
            border-radius: var(--radius);
            border-left: 3px solid hsl(var(--border));
        }

        .event-type {
            font-weight: 600;
            color: hsl(var(--foreground));
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .event-data {
            color: hsl(var(--muted-foreground));
            white-space: pre-wrap;
            word-break: break-word;
        }

        .type-status { border-left-color: hsl(221.2 83.2% 53.3%); }
        .type-token { border-left-color: hsl(142.1 76.2% 36.3%); }
        .type-products_batch { border-left-color: hsl(47.9 95.8% 53.1%); }
        .type-complete { border-left-color: hsl(188.7 85.0% 40.0%); }
        .type-error { border-left-color: hsl(var(--destructive)); }
        .type-user { border-left-color: hsl(var(--primary)); }
        .type-system { border-left-color: hsl(var(--muted-foreground)); }
        .type-response { border-left-color: hsl(262.1 83.3% 57.8%); }

        @media (max-width: 768px) {
            .mode-selector {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">WebSocket/SSE Streaming Demo</h1>
            <p class="page-subtitle">v6.0.0 - Real-time LLM Response Streaming</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" id="modeWebSocket" onclick="selectMode('websocket')">
                WebSocket (Recommended)
            </button>
            <button class="mode-btn" id="modeSSE" onclick="selectMode('sse')">
                SSE (Fallback)
            </button>
            <button class="mode-btn" id="modeHTTP" onclick="selectMode('http')">
                HTTP (Legacy)
            </button>
        </div>

        <div class="card">
            <div class="card-content">
                <div class="controls">
                    <input
                        type="text"
                        id="queryInput"
                        class="input"
                        placeholder="검색어를 입력하세요 (예: 50ml PET 용기)"
                        value="50ml PET 용기"
                    >
                    <button id="sendBtn" class="btn btn-primary" onclick="sendQuery()">전송</button>
                    <button class="btn btn-secondary" onclick="clearOutput()">초기화</button>
                </div>

                <div class="status-bar" id="status">대기 중...</div>

                <div class="output-container" id="output"></div>
            </div>
        </div>
    </div>

    <script src="streaming.js"></script>
    <script>
        let sessionId = 'demo-' + Date.now();
        let currentMode = 'websocket';
        let streamingClient = null;

        function selectMode(mode) {
            currentMode = mode;

            // Update UI
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            const btnId = mode === 'websocket' ? 'modeWebSocket' :
                         mode === 'sse' ? 'modeSSE' : 'modeHTTP';
            document.getElementById(btnId).classList.add('active');

            addEvent('system', `모드 변경: ${mode.toUpperCase()}`);
        }

        function updateStatus(message, active = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            if (active) {
                statusDiv.classList.add('active');
            } else {
                statusDiv.classList.remove('active');
            }
        }

        function addEvent(type, data) {
            const output = document.getElementById('output');

            const eventDiv = document.createElement('div');
            eventDiv.className = `event type-${type}`;

            const typeDiv = document.createElement('div');
            typeDiv.className = 'event-type';
            typeDiv.textContent = `[${type}]`;

            const dataDiv = document.createElement('div');
            dataDiv.className = 'event-data';

            if (typeof data === 'object') {
                dataDiv.textContent = JSON.stringify(data, null, 2);
            } else {
                dataDiv.textContent = data;
            }

            eventDiv.appendChild(typeDiv);
            eventDiv.appendChild(dataDiv);
            output.appendChild(eventDiv);

            // Auto scroll
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            updateStatus('초기화됨');
        }

        async function sendQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('검색어를 입력하세요');
                return;
            }

            // Disable button
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            clearOutput();
            addEvent('user', `Query: ${query}`);
            updateStatus('처리 중...', true);

            try {
                if (currentMode === 'websocket' || currentMode === 'sse') {
                    await queryStreaming(query);
                } else {
                    await queryHTTP(query);
                }
            } catch (error) {
                addEvent('error', error.message || error.toString());
                updateStatus('오류 발생');
            } finally {
                sendBtn.disabled = false;
            }
        }

        async function queryStreaming(query) {
            const collections = null; // Use default
            const materials = null;

            streamingClient = new StreamingClient(sessionId, {
                onStatus: (data, message) => {
                    addEvent('status', data);
                    updateStatus(data, true);
                },
                onToken: (data, message) => {
                    addEvent('token', data);
                },
                onProductsBatch: (data, message) => {
                    addEvent('products_batch', {
                        count: data.length,
                        progress: message.progress,
                        total: message.total
                    });
                    updateStatus(`제품 로딩 중: ${message.progress}/${message.total}`, true);
                },
                onComplete: (data, message) => {
                    addEvent('complete', {
                        total_products: data.total_products,
                        collections_searched: data.collections_searched
                    });
                    updateStatus('완료');
                },
                onError: (error, message) => {
                    addEvent('error', error);
                    updateStatus('오류 발생');
                }
            });

            // Force mode
            if (currentMode === 'sse') {
                streamingClient.useWebSocket = false;
            }

            await streamingClient.query(query, { collections, materials });
        }

        async function queryHTTP(query) {
            updateStatus('HTTP 요청 중...', true);

            const response = await fetch('http://localhost:8001/chat/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    query: query,
                    collections: null,
                    materials: null
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const data = await response.json();

            addEvent('response', {
                total_count: data.total_count,
                products: data.products?.length || 0,
                answer: data.response?.substring(0, 100) + '...'
            });

            updateStatus('완료 (HTTP)');
        }

        // Auto-focus on input
        document.getElementById('queryInput').focus();

        // Enter to send
        document.getElementById('queryInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendQuery();
            }
        });

        // Initial message
        addEvent('system', 'WebSocket/SSE Streaming Demo v6.0.0 initialized');
        addEvent('system', 'Session ID: ' + sessionId);
    </script>
</body>
</html>
