<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - RAG Enterprise</title>
    <link rel="stylesheet" href="/css/design-system.css?v=20251115">
    <style>
        body {
            background: hsl(var(--muted));
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2.5rem 1.25rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: hsl(var(--foreground));
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1rem;
            color: hsl(var(--muted-foreground));
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: hsl(var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: hsl(var(--primary-foreground));
            font-size: 3rem;
            font-weight: 700;
            margin: 0 auto 1.5rem;
        }

        .info-group {
            margin-bottom: 1.25rem;
        }

        .info-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: hsl(var(--muted-foreground));
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1rem;
            color: hsl(var(--foreground));
            padding: 0.75rem 1rem;
            background: hsl(var(--muted));
            border-radius: var(--radius);
            border: 1px solid hsl(var(--border));
        }

        .password-strength {
            height: 4px;
            background: hsl(var(--border));
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .password-strength-fill {
            height: 100%;
            transition: width 0.3s, background 0.3s;
        }

        .form-hint {
            font-size: 0.8125rem;
            color: hsl(var(--muted-foreground));
            margin-top: 0.375rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">My Profile</h1>
            <p class="page-subtitle">Manage your account information and settings</p>
        </div>

        <!-- Profile Information Card -->
        <div class="card mb-6">
            <div class="card-header">
                <h2 class="card-title">Profile Information</h2>
            </div>
            <div class="card-content">
                <div class="profile-avatar" id="profileAvatar">
                    <!-- Filled by JS -->
                </div>

                <div class="info-group">
                    <div class="info-label">Name</div>
                    <div class="info-value" id="userName"></div>
                </div>

                <div class="info-group">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="userEmail"></div>
                </div>

                <div class="info-group">
                    <div class="info-label">Phone</div>
                    <div class="info-value" id="userPhone"></div>
                </div>

                <div class="info-group">
                    <div class="info-label">Role</div>
                    <div>
                        <span class="badge badge-default" id="userRole"></span>
                    </div>
                </div>

                <div class="info-group">
                    <div class="info-label">Account Status</div>
                    <div>
                        <span class="badge badge-success" id="userStatus"></span>
                    </div>
                </div>

                <div class="info-group">
                    <div class="info-label">Joined Date</div>
                    <div class="info-value" id="userCreatedAt"></div>
                </div>

                <div class="info-group">
                    <div class="info-label">Last Login</div>
                    <div class="info-value" id="userLastLogin"></div>
                </div>
            </div>
        </div>

        <!-- Change Password Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Change Password</h2>
            </div>
            <div class="card-content">
                <div id="passwordAlert" class="alert" style="display: none;"></div>

                <form id="passwordForm" onsubmit="handlePasswordChange(event)">
                    <div class="form-group">
                        <label class="label" for="oldPassword">Current Password *</label>
                        <input
                            type="password"
                            id="oldPassword"
                            class="input"
                            placeholder="Enter your current password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="label" for="newPassword">New Password *</label>
                        <input
                            type="password"
                            id="newPassword"
                            class="input"
                            placeholder="Enter your new password"
                            required
                            oninput="checkPasswordStrength()"
                        >
                        <div class="password-strength">
                            <div class="password-strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="form-hint">Minimum 8 characters, letters/numbers/special characters recommended</div>
                    </div>

                    <div class="form-group">
                        <label class="label" for="confirmPassword">Confirm Password *</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            class="input"
                            placeholder="Enter your new password again"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Change Password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Auth and Navigation Scripts -->
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>

    <script>
        const API_BASE = 'http://localhost:8001/api/v1';

        // Initialize profile page
        (async function() {
            const isAuthenticated = await auth.requireAuth();
            if (!isAuthenticated) return;

            // Create navigation bar
            createNavbar();

            // Load user profile
            loadProfile();
        })();

        function loadProfile() {
            const user = auth.getUser();
            if (!user) return;

            // Profile avatar
            document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();

            // User info
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userPhone').textContent = user.phone || 'Not registered';
            document.getElementById('userRole').textContent = getRoleDisplayName(user.role);
            document.getElementById('userStatus').textContent = getStatusDisplayName(user.status);

            // Dates
            const createdAt = new Date(user.created_at);
            document.getElementById('userCreatedAt').textContent = formatDate(createdAt);

            if (user.last_login) {
                const lastLogin = new Date(user.last_login);
                document.getElementById('userLastLogin').textContent = formatDate(lastLogin);
            } else {
                document.getElementById('userLastLogin').textContent = 'No information';
            }
        }

        function getRoleDisplayName(role) {
            const roleNames = {
                'admin': 'Administrator',
                'manager': 'Manager',
                'worker': 'Worker',
                'viewer': 'Viewer'
            };
            return roleNames[role] || role;
        }

        function getStatusDisplayName(status) {
            const statusNames = {
                'active': 'Active',
                'inactive': 'Inactive',
                'suspended': 'Suspended'
            };
            return statusNames[status] || status;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthFill = document.getElementById('strengthFill');

            let strength = 0;
            if (password.length >= 8) strength += 20;
            if (password.length >= 12) strength += 20;
            if (/[a-z]/.test(password)) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 10;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 10;

            let color = 'hsl(var(--destructive))';
            if (strength > 70) color = 'hsl(142.1 76.2% 36.3%)';
            else if (strength > 40) color = 'hsl(47.9 95.8% 53.1%)';

            let width = '0%';
            if (strength > 70) width = '100%';
            else if (strength > 40) width = '66%';
            else if (strength > 0) width = '33%';

            strengthFill.style.width = width;
            strengthFill.style.background = color;
        }

        async function handlePasswordChange(event) {
            event.preventDefault();

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const alertDiv = document.getElementById('passwordAlert');

            // Validation
            if (newPassword.length < 8) {
                showAlert('New password must be at least 8 characters', 'destructive');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('New passwords do not match', 'destructive');
                return;
            }

            if (oldPassword === newPassword) {
                showAlert('New password must be different from current password', 'destructive');
                return;
            }

            // Submit
            submitBtn.disabled = true;
            submitBtn.textContent = 'Changing...';

            try {
                const response = await auth.fetchWithAuth(`${API_BASE}/auth/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Password changed successfully', 'success');
                    document.getElementById('passwordForm').reset();
                    document.getElementById('strengthFill').style.width = '0%';
                } else {
                    showAlert(data.detail || 'Failed to change password', 'destructive');
                }
            } catch (error) {
                console.error('Password change error:', error);
                showAlert('Server connection failed', 'destructive');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Change Password';
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('passwordAlert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';

            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
