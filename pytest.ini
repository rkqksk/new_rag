[pytest]
# Pytest configuration for RAG Enterprise Backend

# Test paths
testpaths = tests

# Python files
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    asyncio: Async tests
    slow: Slow running tests

# Async support
asyncio_mode = auto

# Coverage
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
