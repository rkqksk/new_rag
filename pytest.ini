[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    integration: Integration tests (require services like Qdrant, Redis)
    e2e: End-to-end tests (full pipeline, all services required)
    slow: Tests that take >10 seconds
    asyncio: Async tests

asyncio_mode = auto
timeout = 300

addopts =
    -v
    --strict-markers
    --tb=short
