apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-enterprise
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rkqksk/new_rag_ubuntu.git
    targetRevision: main
    path: infrastructure/k8s/rag-enterprise
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
