# NGINX Reverse Proxy with Caching - 100% FREE
# Alternative to Cloudflare Workers

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache:$upstream_cache_status rt:$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # Cache configuration
    proxy_cache_path /var/cache/nginx/api_cache
                     levels=1:2
                     keys_zone=api_cache:100m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Upstream backend
    upstream api_backend {
        least_conn;
        server api:8001 max_fails=3 fail_timeout=30s;
        # Add more backend servers here for load balancing
        # server api2:8001 max_fails=3 fail_timeout=30s;
        # server api3:8001 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name api.example.com;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Cache status header
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key $request_uri always;

        # Health check endpoint (no cache)
        location /health {
            proxy_pass http://api_backend;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Admin/debug endpoints (no cache)
        location ~ ^/(admin|debug|docs|openapi.json) {
            proxy_pass http://api_backend;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # WebSocket upgrade (no cache)
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # API endpoints with smart caching
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Proxy settings
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Caching
            proxy_cache api_cache;

            # Cache key (includes query string)
            proxy_cache_key "$scheme$request_method$host$request_uri$request_body";

            # Cache different response codes differently
            proxy_cache_valid 200 5m;        # 5 minutes for 200 OK
            proxy_cache_valid 404 1m;        # 1 minute for 404
            proxy_cache_valid any 0;         # Don't cache other codes

            # Cache based on response headers
            proxy_cache_bypass $http_cache_control;  # Bypass if client sends Cache-Control
            proxy_no_cache $http_pragma;              # Bypass if Pragma: no-cache

            # Use stale cache if backend is down
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Search endpoint (longer cache for simple queries)
        location /api/v1/search/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Smart caching based on query complexity
            # This is handled by the backend (SmartCacheMiddleware)
            # NGINX just provides the infrastructure

            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri$request_body";
            proxy_cache_valid 200 10m;  # 10 minutes default
            proxy_cache_bypass $http_cache_control;
            proxy_cache_use_stale error timeout updating;
        }

        # Static files (long cache)
        location /static/ {
            proxy_pass http://api_backend;
            proxy_cache api_cache;
            proxy_cache_valid 200 1d;  # 1 day
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
}
