# Cloudflare Workers Configuration

name = "rag-enterprise-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Account
account_id = "YOUR_ACCOUNT_ID"  # Replace with your Cloudflare account ID

# Vectorize binding
[[vectorize]]
binding = "VECTORIZE"
index_name = "rag-products"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "rag-metadata"
database_id = "YOUR_D1_DATABASE_ID"  # Replace after creating D1

# KV namespace binding
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_ID"  # Replace after creating KV namespace

# Workers AI binding
[ai]
binding = "AI"

# Environment variables
[vars]
API_VERSION = "v1"
ENABLE_CACHING = "true"

# Routes
routes = [
  { pattern = "api.your-domain.com/*", zone_name = "your-domain.com" }
]
