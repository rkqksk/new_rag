# Pre-commit hooks configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # ============================================================================
  # General file checks
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: ✂️  Trim trailing whitespace
      - id: end-of-file-fixer
        name: 📝 Fix end of files
      - id: check-yaml
        name: ✅ Check YAML syntax
      - id: check-json
        name: ✅ Check JSON syntax
      - id: check-toml
        name: ✅ Check TOML syntax
      - id: check-added-large-files
        name: 🚫 Check for large files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: 🚫 Check for merge conflicts
      - id: detect-private-key
        name: 🔐 Detect private keys
      - id: check-case-conflict
        name: 📁 Check case conflicts
      - id: mixed-line-ending
        name: 📄 Check line endings

  # ============================================================================
  # Python code formatting
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: ⚫ Black (code formatter)
        language_version: python3.11
        args: ['--line-length=100']

  # ============================================================================
  # Import sorting
  # ============================================================================
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: 📦 isort (import sorter)
        args: ['--profile', 'black', '--line-length', '100']

  # ============================================================================
  # Linting
  # ============================================================================
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: 🔍 flake8 (linter)
        args:
          - '--max-line-length=100'
          - '--extend-ignore=E203,W503,F401,F841,E501'
          - '--exclude=.git,__pycache__,docs,old,build,dist,migrations'

  # ============================================================================
  # Type checking (optional - can be slow)
  # ============================================================================
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       name: 🔎 mypy (type checker)
  #       additional_dependencies: [types-all]
  #       args: ['--ignore-missing-imports', '--no-strict-optional']

  # ============================================================================
  # Security checks
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: 🔐 detect-secrets (find secrets)
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # ============================================================================
  # Dockerfile linting
  # ============================================================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.1-beta
    hooks:
      - id: hadolint-docker
        name: 🐳 hadolint (Dockerfile linter)

  # ============================================================================
  # Markdown linting
  # ============================================================================
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        name: 📝 markdownlint
        args: ['--fix']

# ============================================================================
# Configuration
# ============================================================================
default_language_version:
  python: python3.11

# Files to exclude from all hooks
exclude: |
  (?x)^(
      \.git/.*|
      \.pytest_cache/.*|
      __pycache__/.*|
      \.mypy_cache/.*|
      \.venv/.*|
      venv/.*|
      build/.*|
      dist/.*|
      \.egg-info/.*|
      migrations/.*|
      alembic/versions/.*|
      docs/.*\.md|
      \.claude-backup/.*
  )$

# ============================================================================
# CI behavior
# ============================================================================
# Automatically update versions
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
