<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로필 - RAG Enterprise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #f7f7f8;
            color: #2d333a;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #2d333a;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 16px;
            color: #6e6e80;
        }

        .card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d333a;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: 700;
            margin: 0 auto 24px;
        }

        .info-group {
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 14px;
            font-weight: 600;
            color: #6e6e80;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 16px;
            color: #2d333a;
            padding: 12px 16px;
            background: #f7f7f8;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .role-badge {
            display: inline-block;
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            background: #4ade80;
            color: white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #6e6e80;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            color: #2d333a;
            background: white;
            transition: border-color 0.15s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-hint {
            font-size: 13px;
            color: #8e8ea0;
            margin-top: 6px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-fill {
            height: 100%;
            transition: width 0.3s, background 0.3s;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            .card {
                padding: 24px;
            }

            .page-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">내 프로필</h1>
            <p class="page-subtitle">계정 정보 및 설정을 관리합니다</p>
        </div>

        <!-- Profile Information Card -->
        <div class="card">
            <h2 class="card-title">프로필 정보</h2>

            <div class="profile-avatar" id="profileAvatar">
                <!-- Filled by JS -->
            </div>

            <div class="info-group">
                <div class="info-label">이름</div>
                <div class="info-value" id="userName"></div>
            </div>

            <div class="info-group">
                <div class="info-label">이메일</div>
                <div class="info-value" id="userEmail"></div>
            </div>

            <div class="info-group">
                <div class="info-label">전화번호</div>
                <div class="info-value" id="userPhone"></div>
            </div>

            <div class="info-group">
                <div class="info-label">역할</div>
                <div>
                    <span class="role-badge" id="userRole"></span>
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">계정 상태</div>
                <div>
                    <span class="status-badge" id="userStatus"></span>
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">가입일</div>
                <div class="info-value" id="userCreatedAt"></div>
            </div>

            <div class="info-group">
                <div class="info-label">최근 로그인</div>
                <div class="info-value" id="userLastLogin"></div>
            </div>
        </div>

        <!-- Change Password Card -->
        <div class="card">
            <h2 class="card-title">비밀번호 변경</h2>

            <div id="passwordAlert" class="alert"></div>

            <form id="passwordForm" onsubmit="handlePasswordChange(event)">
                <div class="form-group">
                    <label class="form-label" for="oldPassword">현재 비밀번호 *</label>
                    <input
                        type="password"
                        id="oldPassword"
                        class="form-input"
                        placeholder="현재 비밀번호를 입력하세요"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="newPassword">새 비밀번호 *</label>
                    <input
                        type="password"
                        id="newPassword"
                        class="form-input"
                        placeholder="새 비밀번호를 입력하세요"
                        required
                        oninput="checkPasswordStrength()"
                    >
                    <div class="password-strength">
                        <div class="password-strength-fill" id="strengthFill"></div>
                    </div>
                    <div class="form-hint">최소 8자 이상, 영문/숫자/특수문자 조합 권장</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">비밀번호 확인 *</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        class="form-input"
                        placeholder="새 비밀번호를 다시 입력하세요"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    비밀번호 변경
                </button>
            </form>
        </div>
    </div>

    <!-- Auth and Navigation Scripts -->
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>

    <script>
        const API_BASE = 'http://localhost:8001/api/v1';

        // Initialize profile page
        (async function() {
            const isAuthenticated = await auth.requireAuth();
            if (!isAuthenticated) return;

            // Create navigation bar
            createNavbar();

            // Load user profile
            loadProfile();
        })();

        function loadProfile() {
            const user = auth.getUser();
            if (!user) return;

            // Profile avatar
            document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();

            // User info
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userPhone').textContent = user.phone || '등록되지 않음';
            document.getElementById('userRole').textContent = getRoleDisplayName(user.role);
            document.getElementById('userStatus').textContent = getStatusDisplayName(user.status);

            // Dates
            const createdAt = new Date(user.created_at);
            document.getElementById('userCreatedAt').textContent = formatDate(createdAt);

            if (user.last_login) {
                const lastLogin = new Date(user.last_login);
                document.getElementById('userLastLogin').textContent = formatDate(lastLogin);
            } else {
                document.getElementById('userLastLogin').textContent = '정보 없음';
            }
        }

        function getRoleDisplayName(role) {
            const roleNames = {
                'admin': '관리자',
                'manager': '매니저',
                'worker': '작업자',
                'viewer': '조회자'
            };
            return roleNames[role] || role;
        }

        function getStatusDisplayName(status) {
            const statusNames = {
                'active': '활성',
                'inactive': '비활성',
                'suspended': '정지'
            };
            return statusNames[status] || status;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthFill = document.getElementById('strengthFill');

            let strength = 0;
            if (password.length >= 8) strength += 20;
            if (password.length >= 12) strength += 20;
            if (/[a-z]/.test(password)) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 10;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 10;

            let color = '#ff6b6b';
            if (strength > 70) color = '#4ade80';
            else if (strength > 40) color = '#ffc107';

            let width = '0%';
            if (strength > 70) width = '100%';
            else if (strength > 40) width = '66%';
            else if (strength > 0) width = '33%';

            strengthFill.style.width = width;
            strengthFill.style.background = color;
        }

        async function handlePasswordChange(event) {
            event.preventDefault();

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const alertDiv = document.getElementById('passwordAlert');

            // Validation
            if (newPassword.length < 8) {
                showAlert('새 비밀번호는 최소 8자 이상이어야 합니다', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('새 비밀번호가 일치하지 않습니다', 'error');
                return;
            }

            if (oldPassword === newPassword) {
                showAlert('새 비밀번호는 현재 비밀번호와 달라야 합니다', 'error');
                return;
            }

            // Submit
            submitBtn.disabled = true;
            submitBtn.textContent = '변경 중...';

            try {
                const response = await auth.fetchWithAuth(`${API_BASE}/auth/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('비밀번호가 성공적으로 변경되었습니다', 'success');
                    document.getElementById('passwordForm').reset();
                    document.getElementById('strengthFill').style.width = '0%';
                } else {
                    showAlert(data.detail || '비밀번호 변경에 실패했습니다', 'error');
                }
            } catch (error) {
                console.error('Password change error:', error);
                showAlert('서버 연결에 실패했습니다', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '비밀번호 변경';
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('passwordAlert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;

            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
