<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RAG Enterprise</title>
    <link rel="stylesheet" href="/css/design-system.css?v=20251115">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: hsl(var(--muted));
        }

        .register-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 2rem 1rem;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: hsl(var(--foreground));
            margin-bottom: 0.5rem;
        }

        .logo-subtitle {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group.error .input {
            border-color: hsl(var(--destructive));
        }

        .error-message {
            display: none;
            font-size: 0.75rem;
            color: hsl(var(--destructive));
            margin-top: 0.25rem;
        }

        .error-message.show {
            display: block;
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: hsl(var(--border));
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: hsl(var(--destructive));
        }

        .password-strength-bar.medium {
            width: 66%;
            background: hsl(47.9 95.8% 53.1%);
        }

        .password-strength-bar.strong {
            width: 100%;
            background: hsl(142.1 76.2% 36.3%);
        }

        .password-hint {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            margin-top: 0.25rem;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: hsl(var(--border));
        }

        .divider span {
            position: relative;
            background: hsl(var(--card));
            padding: 0 1rem;
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .login-link {
            text-align: center;
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }

        .login-link a {
            color: hsl(var(--primary));
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        select.input {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="card">
            <div class="logo-section">
                <h1 class="logo-title">RAG Enterprise</h1>
                <p class="logo-subtitle">Create New Account</p>
            </div>

            <div id="alert" class="alert" style="display: none;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="label" for="name">Name *</label>
                    <input type="text" id="name" name="name" class="input"
                           placeholder="Enter your name" required>
                    <div id="nameError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="email">Email *</label>
                    <input type="email" id="email" name="email" class="input"
                           placeholder="Enter your email" required>
                    <div id="emailError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="input"
                           placeholder="010-1234-5678">
                    <div id="phoneError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="password">Password *</label>
                    <input type="password" id="password" name="password" class="input"
                           placeholder="Enter your password" required>
                    <div class="password-strength">
                        <div id="strengthBar" class="password-strength-bar"></div>
                    </div>
                    <div class="password-hint">Minimum 8 characters required</div>
                    <div id="passwordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="input"
                           placeholder="Enter your password again" required>
                    <div id="confirmPasswordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="role">Role</label>
                    <select id="role" name="role" class="input">
                        <option value="worker">Worker</option>
                        <option value="manager">Manager</option>
                        <option value="viewer">Viewer</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;" id="registerBtn">
                    <span id="btnText">Sign Up</span>
                    <span id="btnLoading" class="loading-spinner" style="display:none;"></span>
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';

        const form = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const registerBtn = document.getElementById('registerBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const alert = document.getElementById('alert');

        // Password strength indicator
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strength = calculatePasswordStrength(password);

            strengthBar.className = 'password-strength-bar';
            if (strength > 0) {
                strengthBar.classList.add(strength > 70 ? 'strong' : strength > 40 ? 'medium' : 'weak');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear previous errors
            clearErrors();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const role = document.getElementById('role').value;

            // Validation
            let hasError = false;

            if (!name) {
                showError('name', 'Please enter your name');
                hasError = true;
            }

            if (!email) {
                showError('email', 'Please enter your email');
                hasError = true;
            }

            if (password.length < 8) {
                showError('password', 'Password must be at least 8 characters');
                hasError = true;
            }

            if (password !== confirmPassword) {
                showError('confirmPassword', 'Passwords do not match');
                hasError = true;
            }

            if (hasError) return;

            // Show loading state
            setLoading(true);

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        phone: phone || null,
                        role
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Show success message
                    showAlert('Registration successful! Redirecting to login page...', 'success');

                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    // Show error message
                    showAlert(data.detail || 'Registration failed', 'destructive');
                }
            } catch (error) {
                console.error('Register error:', error);
                showAlert('Server connection failed. Please try again later.', 'destructive');
            } finally {
                setLoading(false);
            }
        });

        function calculatePasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength += 20;
            if (password.length >= 12) strength += 20;
            if (/[a-z]/.test(password)) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 10;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 10;
            return strength;
        }

        function setLoading(loading) {
            registerBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnLoading.style.display = loading ? 'inline-block' : 'none';
        }

        function showError(field, message) {
            const input = document.getElementById(field);
            const errorDiv = document.getElementById(field + 'Error');
            const formGroup = input.closest('.form-group');

            formGroup.classList.add('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearErrors() {
            document.querySelectorAll('.form-group').forEach(group => {
                group.classList.remove('error');
            });
            document.querySelectorAll('.error-message').forEach(msg => {
                msg.classList.remove('show');
            });
            alert.style.display = 'none';
        }

        function showAlert(message, type) {
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
        }
    </script>
</body>
</html>
