<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Enterprise - 컨텍스트 인식 채팅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-user {
            justify-content: flex-end;
        }

        .message-bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message-user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-bot .message-content {
            background: white;
            border: 1px solid #e5e7eb;
            color: #111827;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .intent-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .reference-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .product-card {
            background: #f3f4f6;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .product-card-title {
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }

        .product-card-info {
            font-size: 0.85rem;
            color: #6b7280;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .quick-action-btn {
            background: white;
            border: 1px solid #e5e7eb;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action-btn:hover {
            background: #f3f4f6;
            border-color: #667eea;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 RAG Enterprise 채팅</h1>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="statusText">연결 중...</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message message-bot">
                <div>
                    <div class="message-content">
                        안녕하세요! 화장품 용기 검색을 도와드리겠습니다. 😊<br><br>
                        원하시는 용기의 용량, 재질, 용도 등을 말씀해주세요!
                    </div>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="sendQuickMessage('100ml 에센스 용기 추천해줘')">100ml 에센스 용기</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('PE 재질 토너 용기')">PE 토너 용기</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('투명 세럼병 찾아줘')">투명 세럼병</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input
                    type="text"
                    class="chat-input"
                    id="chatInput"
                    placeholder="메시지를 입력하세요..."
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-button" id="sendButton" onclick="sendMessage()">
                    전송
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001';
        let sessionId = null;
        let ws = null;

        // 세션 생성
        async function createSession() {
            try {
                const response = await fetch(`${API_BASE}/chat/create_session`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: 'web_user_' + Date.now()})
                });
                const data = await response.json();
                sessionId = data.session_id;
                console.log('세션 생성:', sessionId);
                return sessionId;
            } catch (error) {
                console.error('세션 생성 실패:', error);
                updateStatus('연결 실패', false);
                return null;
            }
        }

        // WebSocket 연결
        async function connectWebSocket() {
            if (!sessionId) {
                sessionId = await createSession();
                if (!sessionId) return;
            }

            ws = new WebSocket(`ws://localhost:8001/chat/ws/${sessionId}`);

            ws.onopen = () => {
                console.log('WebSocket 연결됨');
                updateStatus('연결됨', true);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                console.log('수신:', message);
                handleBotResponse(message);
            };

            ws.onerror = (error) => {
                console.error('WebSocket 오류:', error);
                updateStatus('오류 발생', false);
            };

            ws.onclose = () => {
                console.log('WebSocket 연결 종료');
                updateStatus('연결 끊김', false);
                // 재연결 시도
                setTimeout(connectWebSocket, 3000);
            };
        }

        // 상태 업데이트
        function updateStatus(text, connected) {
            document.getElementById('statusText').textContent = text;
            const dot = document.querySelector('.status-dot');
            dot.style.background = connected ? '#4ade80' : '#ef4444';
        }

        // 메시지 전송
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            // 사용자 메시지 표시
            addMessage('user', message);

            // 입력창 초기화
            input.value = '';

            // 타이핑 인디케이터 표시
            showTypingIndicator();

            // WebSocket으로 전송
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({query: message}));
            } else {
                // WebSocket 연결 안 됨 → HTTP API 사용
                sendViaHTTP(message);
            }
        }

        // HTTP API로 전송 (폴백)
        async function sendViaHTTP(message) {
            try {
                if (!sessionId) {
                    sessionId = await createSession();
                }

                const response = await fetch(`${API_BASE}/chat/query`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        query: message
                    })
                });

                const data = await response.json();
                handleBotResponse({type: 'response', data: data});
            } catch (error) {
                console.error('HTTP 요청 실패:', error);
                hideTypingIndicator();
                addMessage('bot', '죄송합니다. 일시적인 오류가 발생했습니다.');
            }
        }

        // 봇 응답 처리
        function handleBotResponse(message) {
            hideTypingIndicator();

            if (message.type === 'error') {
                addMessage('bot', `오류: ${message.error}`);
                return;
            }

            const data = message.data;

            // 응답 메시지 구성
            let content = data.response || '검색 결과가 없습니다.';

            // 제품 카드 추가
            if (data.products && data.products.length > 0) {
                content += '<div style="margin-top: 12px;">';
                data.products.slice(0, 3).forEach(product => {
                    content += `
                        <div class="product-card">
                            <div class="product-card-title">${product.product_name || 'N/A'}</div>
                            <div class="product-card-info">
                                ${product.product_code || ''} |
                                ${product.specifications?.['재질(원료)'] || ''} |
                                ${product.specifications?.capacity || ''} |
                                ${product.specifications?.neck_size || ''}
                            </div>
                        </div>
                    `;
                });
                content += '</div>';
            }

            // 봇 메시지 표시
            addMessage('bot', content, {
                intent: data.intent?.intent,
                referenceResolved: data.reference_resolved,
                productCount: data.total_count
            });
        }

        // 메시지 추가
        function addMessage(type, content, meta = {}) {
            const messagesDiv = document.getElementById('chatMessages');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;

            let metaHtml = '';
            if (type === 'bot' && meta) {
                let badges = '';
                if (meta.intent) {
                    badges += `<span class="intent-badge">${meta.intent}</span>`;
                }
                if (meta.referenceResolved) {
                    badges += `<span class="reference-badge">참조 해결됨</span>`;
                }
                if (meta.productCount !== undefined) {
                    badges += `<span class="intent-badge">${meta.productCount}개 제품</span>`;
                }
                if (badges) {
                    metaHtml = `<div class="message-meta">${badges}</div>`;
                }
            }

            messageDiv.innerHTML = `
                <div>
                    <div class="message-content">${content}</div>
                    ${metaHtml}
                </div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 타이핑 인디케이터
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'message message-bot';
            indicator.innerHTML = `
                <div>
                    <div class="message-content typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(indicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // 빠른 메시지 전송
        function sendQuickMessage(message) {
            document.getElementById('chatInput').value = message;
            sendMessage();
        }

        // Enter 키 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 초기화
        window.addEventListener('load', () => {
            connectWebSocket();
        });
    </script>
</body>
</html>
