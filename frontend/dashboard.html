<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Management Dashboard - RAG Enterprise</title>
    <link rel="stylesheet" href="/css/design-system.css?v=20251115">
    <style>
        body {
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: hsl(var(--foreground));
        }

        h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: hsl(var(--foreground));
        }

        .section {
            margin-bottom: 1.5rem;
        }

        .description {
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .collection-card {
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 1rem;
            transition: all 0.15s;
            background: hsl(var(--card));
            cursor: pointer;
        }

        .collection-card:hover {
            background: hsl(var(--muted));
            border-color: hsl(var(--ring));
        }

        .collection-card.active {
            border-color: hsl(var(--primary));
            background: hsl(var(--muted));
        }

        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .collection-title {
            font-size: 1rem;
            font-weight: 600;
            color: hsl(var(--foreground));
        }

        .collection-id {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            font-family: 'Monaco', 'Courier New', monospace;
            margin-top: 0.25rem;
        }

        .collection-stats {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid hsl(var(--border));
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.375rem;
            font-size: 0.875rem;
        }

        .stat-label {
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .stat-value {
            font-weight: 500;
            color: hsl(var(--foreground));
            font-size: 0.875rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.75rem;
            background: hsl(var(--muted));
            border-radius: var(--radius);
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .checkbox-wrapper:hover {
            border-color: hsl(var(--border));
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-wrapper label {
            cursor: pointer;
            font-size: 0.875rem;
            color: hsl(var(--foreground));
        }

        .actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .selected-count {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
            margin-top: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Collection Management Dashboard</h1>

        <!-- Error Message -->
        <div id="error-message" class="alert alert-destructive" style="display: none;"></div>

        <!-- Collections Section -->
        <div class="section">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Data Source Selection</h2>
                    <p class="description">
                        Select the data sources you want to search. You can select multiple sources.
                    </p>
                </div>

                <div class="card-content">
                    <div id="collections-container">
                        <div class="loading">Loading collection list...</div>
                    </div>

                    <div class="selected-count" id="selected-count"></div>

                    <div class="actions">
                        <button class="btn btn-primary" onclick="saveSelection()">Save Selection</button>
                        <button class="btn btn-primary" onclick="goToChat()">Start Chat</button>
                        <button class="btn btn-secondary" onclick="resetSelection()">Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="section">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Overall Statistics</h2>
                </div>
                <div class="card-content">
                    <div id="stats-container">
                        <div class="loading">Loading statistics...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin + '/chat';
        let collections = [];
        let selectedCollections = new Set();

        // Load collections from localStorage
        function loadSavedSelections() {
            const saved = localStorage.getItem('selected_collections');
            if (saved) {
                selectedCollections = new Set(JSON.parse(saved));
            }
        }

        // Save collections to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('selected_collections', JSON.stringify([...selectedCollections]));
        }

        // Fetch collections from API
        async function fetchCollections() {
            try {
                const response = await fetch(`${API_BASE_URL}/collections?enabled_only=true&embedded_only=true`);
                if (!response.ok) throw new Error('API not available, using mock data');

                const data = await response.json();
                collections = data.collections || [];

                renderCollections();
                updateStats();
            } catch (error) {
                // Use mock data when API is not available
                console.warn('Using mock collection data:', error.message);
                collections = [
                    {
                        name: "onehago_products",
                        collection_id: "onehago_products",
                        points_count: 3246,
                        vectors_count: 3246,
                        indexed_vectors_count: 3246,
                        status: "green",
                        optimizer_status: "ok",
                        disk_data_size: 12845680,
                        ram_data_size: 5242880
                    },
                    {
                        name: "freemold_catalog",
                        collection_id: "freemold_catalog",
                        points_count: 1520,
                        vectors_count: 1520,
                        indexed_vectors_count: 1520,
                        status: "green",
                        optimizer_status: "ok",
                        disk_data_size: 6422840,
                        ram_data_size: 2621440
                    },
                    {
                        name: "chunjin_products",
                        collection_id: "chunjin_products",
                        points_count: 892,
                        vectors_count: 892,
                        indexed_vectors_count: 892,
                        status: "green",
                        optimizer_status: "ok",
                        disk_data_size: 3784520,
                        ram_data_size: 1572864
                    }
                ];
                renderCollections();
                updateStats();
            }
        }

        // Render collections
        function renderCollections() {
            const container = document.getElementById('collections-container');

            if (collections.length === 0) {
                container.innerHTML = '<div class="empty-state">No collections available.</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'collections-grid';

            collections.forEach(col => {
                const isSelected = selectedCollections.has(col.id);

                const card = document.createElement('div');
                card.className = `collection-card ${isSelected ? 'active' : ''}`;
                card.onclick = () => toggleCollection(col.id);

                card.innerHTML = `
                    <div class="collection-header">
                        <div>
                            <div class="collection-title">${col.name}</div>
                            <div class="collection-id">${col.id}</div>
                        </div>
                        <span class="badge ${col.embedded ? 'badge-success' : 'badge-secondary'}">
                            ${col.embedded ? 'Active' : 'Inactive'}
                        </span>
                    </div>
                    <div class="collection-stats">
                        <div class="stat-row">
                            <span class="stat-label">Total Documents</span>
                            <span class="stat-value">${col.total_documents.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Last Updated</span>
                            <span class="stat-value">${col.last_updated || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="cb_${col.id}" ${isSelected ? 'checked' : ''}
                               onclick="event.stopPropagation(); toggleCollection('${col.id}')">
                        <label for="cb_${col.id}" onclick="event.stopPropagation()">Include in search</label>
                    </div>
                `;

                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
            updateSelectedCount();
        }

        // Toggle collection selection
        function toggleCollection(collectionId) {
            if (selectedCollections.has(collectionId)) {
                selectedCollections.delete(collectionId);
            } else {
                selectedCollections.add(collectionId);
            }
            renderCollections();
        }

        // Update selected count
        function updateSelectedCount() {
            const count = selectedCollections.size;
            const total = collections.length;
            const countEl = document.getElementById('selected-count');
            countEl.textContent = `${count}/${total} collections selected`;
        }

        // Update stats
        function updateStats() {
            const statsContainer = document.getElementById('stats-container');

            const totalDocs = collections.reduce((sum, col) => sum + col.total_documents, 0);
            const activeCols = collections.filter(col => col.embedded).length;

            statsContainer.innerHTML = `
                <div class="stat-row">
                    <span class="stat-label">Total Collections</span>
                    <span class="stat-value">${collections.length}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Active Collections</span>
                    <span class="stat-value">${activeCols}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Total Documents</span>
                    <span class="stat-value">${totalDocs.toLocaleString()}</span>
                </div>
            `;
        }

        // Save selection
        function saveSelection() {
            saveToLocalStorage();
            alert(`${selectedCollections.size} collections saved.`);
        }

        // Reset selection
        function resetSelection() {
            selectedCollections.clear();
            saveToLocalStorage();
            renderCollections();
        }

        // Go to chat
        function goToChat() {
            // Save current selection
            saveToLocalStorage();

            // Redirect to chat.html
            window.location.href = 'chat.html';
        }

        // Show error
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Initialize
        loadSavedSelections();
        fetchCollections();
    </script>
</body>
</html>
