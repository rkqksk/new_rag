<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RAG Enterprise</title>
    <link rel="stylesheet" href="/css/design-system.css?v=20251115">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: hsl(var(--muted));
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 2rem 1rem;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: hsl(var(--foreground));
            margin-bottom: 0.5rem;
        }

        .logo-subtitle {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group.error .input {
            border-color: hsl(var(--destructive));
        }

        .error-message {
            display: none;
            font-size: 0.75rem;
            color: hsl(var(--destructive));
            margin-top: 0.25rem;
        }

        .error-message.show {
            display: block;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        .forgot-link {
            color: hsl(var(--primary));
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: hsl(var(--border));
        }

        .divider span {
            position: relative;
            background: hsl(var(--card));
            padding: 0 1rem;
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .signup-link {
            text-align: center;
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }

        .signup-link a {
            color: hsl(var(--primary));
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .test-accounts {
            margin-top: 1.5rem;
            padding: 1rem;
            background: hsl(var(--muted));
            border-radius: var(--radius);
            font-size: 0.75rem;
        }

        .test-accounts-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: hsl(var(--foreground));
        }

        .test-accounts p {
            margin: 0.25rem 0;
            color: hsl(var(--muted-foreground));
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card">
            <div class="logo-section">
                <h1 class="logo-title">RAG Enterprise</h1>
                <p class="logo-subtitle">Integrated Management System</p>
            </div>

            <div id="alert" class="alert" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="label" for="email">Email</label>
                    <input type="email" id="email" name="email" class="input"
                           placeholder="Enter your email" required>
                    <div id="emailError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="input"
                           placeholder="Enter your password" required>
                    <div id="passwordError" class="error-message"></div>
                </div>

                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">
                    <span id="btnText">Login</span>
                    <span id="btnLoading" class="loading-spinner" style="display:none;"></span>
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="signup-link">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>

            <div class="test-accounts">
                <div class="test-accounts-title">Test Accounts</div>
                <p><strong>Admin:</strong> admin@example.com / password123</p>
                <p><strong>Worker:</strong> worker@example.com / password123</p>
                <p><strong>Customer:</strong> customer@example.com / password123</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const alert = document.getElementById('alert');

        // Load saved email if "remember me" was checked
        const savedEmail = localStorage.getItem('rememberedEmail');
        if (savedEmail) {
            emailInput.value = savedEmail;
            document.getElementById('remember').checked = true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const remember = document.getElementById('remember').checked;

            if (!email) {
                showError('email', 'Please enter your email');
                return;
            }

            if (!password) {
                showError('password', 'Please enter your password');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    if (remember) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }

                    showAlert('Login successful! Redirecting...', 'success');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert(data.detail || 'Login failed', 'destructive');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Server connection failed. Please try again later.', 'destructive');
            } finally {
                setLoading(false);
            }
        });

        function setLoading(loading) {
            loginBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnLoading.style.display = loading ? 'inline-block' : 'none';
        }

        function showError(field, message) {
            const input = document.getElementById(field);
            const errorDiv = document.getElementById(field + 'Error');
            const formGroup = input.closest('.form-group');

            formGroup.classList.add('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearErrors() {
            document.querySelectorAll('.form-group').forEach(group => {
                group.classList.remove('error');
            });
            document.querySelectorAll('.error-message').forEach(msg => {
                msg.classList.remove('show');
            });
            alert.style.display = 'none';
        }

        function showAlert(message, type) {
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
        }

        // Check if already logged in
        const token = localStorage.getItem('access_token');
        if (token) {
            fetch(`${API_BASE}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(response => {
                if (response.ok) {
                    window.location.href = 'index.html';
                }
            }).catch(() => {
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                localStorage.removeItem('user');
            });
        }
    </script>
</body>
</html>
