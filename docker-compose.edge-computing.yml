# Docker Compose - Edge Computing Platform v7.2.0
# Complete All-in-One System: Jetson + Raspberry Pi + Industrial IoT
#
# Features:
# - Computer Vision (6+ models: YOLO, DeepSORT, MediaPipe, SAM, OCR, Face)
# - IoT Sensors (10+ types: temp, humidity, vibration, etc.)
# - Industrial Protocols (MQTT, Modbus, OPC-UA)
# - Predictive Maintenance (vibration/temp analysis, RUL estimation)
# - Time Series Analytics (TimescaleDB + Grafana)
#
# Expected Savings: $105k/year ($1M+ over 10 years)

version: '3.8'

services:
  # ========================================
  # API Server (Edge Computing + Manufacturing)
  # ========================================
  api-edge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api-edge
    runtime: nvidia  # Use Jetson GPU
    ports:
      - "8001:8001"  # API
    environment:
      # Physical Robot Configuration
      UR10E_IP: "192.168.1.100"  # ⚠️ UPDATE with your UR10e IP
      UR10E_SIMULATION: "false"  # Physical robot

      # Camera Configuration
      CAMERA_ENABLED: "true"
      CAMERA_URL: "http://192.168.1.102:5000"  # ⚠️ UPDATE with Pi IP
      CAMERA_FPS: 30

      # Jetson GPU
      CUDA_VISIBLE_DEVICES: "0"
      JETSON_MODEL: "true"

      # LORA Configuration
      LORA_MODELS_PATH: "/app/data/manufacturing/models/lora_adapters"
      LORA_DEVICE: "cuda"

      # MQTT Broker
      MQTT_BROKER_HOST: "mqtt-broker"
      MQTT_BROKER_PORT: 1883

      # Modbus Gateway (if needed)
      MODBUS_ENABLED: "true"
      MODBUS_TCP_HOST: "192.168.1.200"  # ⚠️ UPDATE if using Modbus TCP

      # Database
      POSTGRES_HOST: postgres-timescale
      REDIS_HOST: redis
      QDRANT_HOST: qdrant

    volumes:
      - ./data/manufacturing:/app/data/manufacturing
      - ./data/iot:/app/data/iot
      - ./models:/app/models

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]

    networks:
      - edge-network
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8001
      --workers 2
      --log-level info

  # ========================================
  # MQTT Broker (Eclipse Mosquitto)
  # ========================================
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "1883:1883"  # MQTT
      - "9001:9001"  # WebSocket
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    networks:
      - edge-network
    restart: unless-stopped

  # ========================================
  # PostgreSQL + TimescaleDB (Time Series)
  # ========================================
  postgres-timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres-timescale
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: rag_enterprise
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./scripts/init_timescale.sql:/docker-entrypoint-initdb.d/init_timescale.sql
    networks:
      - edge-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Grafana (Analytics Dashboard)
  # ========================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-edge
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""  # Add plugins if needed
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - edge-network
    restart: unless-stopped
    depends_on:
      - postgres-timescale

  # ========================================
  # Redis (Cache + Pub/Sub)
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: redis-edge
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    networks:
      - edge-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ========================================
  # Qdrant (Vector Database)
  # ========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-edge
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - edge-network
    restart: unless-stopped

  # ========================================
  # Dashboard (NGINX)
  # ========================================
  dashboard:
    image: nginx:alpine
    container_name: edge-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - edge-network
    restart: unless-stopped

  # ========================================
  # Model Zoo Trainer (On-Demand)
  # ========================================
  model-trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: model-trainer-edge
    runtime: nvidia
    environment:
      TRAINING_MODE: "jetson"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - ./data/manufacturing:/app/data/manufacturing
      - ./data/iot:/app/data/iot
      - ./models:/app/models
      - ./scripts:/app/scripts
    networks:
      - edge-network
    restart: "no"  # Run on-demand
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute]
    command: >
      bash -c "
      echo 'Model Trainer ready for edge computing';
      echo 'Train LORA: docker-compose exec model-trainer python scripts/train_lora_adapter.py --product <name>';
      echo 'Train Maintenance Model: docker-compose exec model-trainer python scripts/train_predictive_model.py';
      tail -f /dev/null
      "

networks:
  edge-network:
    name: edge-network
    driver: bridge

volumes:
  # MQTT
  mqtt-data:
  mqtt-logs:

  # PostgreSQL + TimescaleDB
  timescale-data:

  # Grafana
  grafana-data:

  # Redis
  redis-data:

  # Qdrant
  qdrant-data:

# ========================================
# Setup Instructions
# ========================================
#
# 1. Hardware Setup:
#    - Jetson: Main compute, run this docker-compose
#    - Raspberry Pi: Camera server (scripts/camera_server.py)
#    - UR10e: Physical robot (IP: 192.168.1.100)
#
# 2. Network Configuration:
#    - All devices on same network (192.168.1.x)
#    - Static IPs recommended
#    - Firewall rules: Allow 1883 (MQTT), 5432 (PostgreSQL)
#
# 3. Start Services:
#    docker-compose -f docker-compose.edge-computing.yml up -d
#
# 4. Initialize TimescaleDB:
#    docker-compose exec postgres-timescale psql -U rag_user -d rag_enterprise -f /docker-entrypoint-initdb.d/init_timescale.sql
#
# 5. Access Dashboards:
#    - Grafana: http://jetson-ip:3000 (admin/admin)
#    - API Docs: http://jetson-ip:8001/api/v1/docs
#    - Manufacturing Dashboard: http://jetson-ip:8080
#    - Qdrant: http://jetson-ip:16333/dashboard
#
# 6. Test MQTT:
#    # Publish sensor data
#    mosquitto_pub -h jetson-ip -t "sensors/temp_01/data" -m '{"temperature":25.5}'
#
#    # Subscribe to sensor data
#    mosquitto_sub -h jetson-ip -t "sensors/#" -v
#
# 7. Configure Grafana:
#    - Add TimescaleDB data source:
#      Host: postgres-timescale:5432
#      Database: rag_enterprise
#      User: rag_user
#      Password: rag_password
#
#    - Import dashboards from config/grafana/dashboards/
#
# 8. Sensor Registration (via API):
#    curl -X POST http://jetson-ip:8001/api/v1/iot/sensors/register \
#      -H "Content-Type: application/json" \
#      -d '{
#        "sensor_id": "temp_01",
#        "sensor_type": "temperature",
#        "interface": "i2c",
#        "address": "0x76"
#      }'
#
# 9. Equipment Registration (Predictive Maintenance):
#    curl -X POST http://jetson-ip:8001/api/v1/maintenance/equipment/register \
#      -H "Content-Type: application/json" \
#      -d '{
#        "equipment_id": "motor_01",
#        "equipment_type": "motor",
#        "sensor_ids": ["vibration_01", "temp_02"]
#      }'
#
# 10. Health Check:
#     curl http://jetson-ip:8001/api/v1/health
#
# ========================================
# Monitoring & Alerts
# ========================================
#
# View Logs:
#   docker-compose logs -f api-edge
#   docker-compose logs -f mqtt-broker
#   docker-compose logs -f postgres-timescale
#
# MQTT Stats:
#   docker-compose exec mqtt-broker mosquitto_sub -t '$SYS/#' -v
#
# Database Stats:
#   docker-compose exec postgres-timescale psql -U rag_user -d rag_enterprise -c "SELECT * FROM timescaledb_information.hypertables;"
