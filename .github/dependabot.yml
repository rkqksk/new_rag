# =============================================================================
# Dependabot Configuration for RAG Enterprise
# =============================================================================
# Automated dependency updates for Python, Docker, and GitHub Actions
#
# Update schedule: Weekly on Monday at 08:00 UTC
# =============================================================================

version: 2

updates:
  # ---------------------------------------------------------------------------
  # Python Dependencies (requirements.txt)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    versioning-strategy: increase

  # ---------------------------------------------------------------------------
  # Docker Dependencies (Dockerfile base images)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"

  # ---------------------------------------------------------------------------
  # GitHub Actions Dependencies
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions):"

# =============================================================================
# Notes
# =============================================================================
# Auto-merge Strategy:
#   - All updates create PRs automatically
#   - Manually review and merge based on:
#     - Patch updates (1.2.3 → 1.2.4): Quick review
#     - Minor updates (1.2.0 → 1.3.0): Standard review
#     - Major updates (1.0.0 → 2.0.0): Thorough review + testing
#
# Security:
#   - All updates run through CI pipeline
#   - Review security alerts from Dependabot
#   - Priority labels applied to security updates
# =============================================================================
