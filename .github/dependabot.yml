# =============================================================================
# Dependabot Configuration for RAG Enterprise
# =============================================================================
# Automated dependency updates with auto-merge for patch versions.
#
# Update schedule: Weekly on Monday at 08:00 UTC
# Auto-merge: Patch versions only (e.g., 1.2.3 → 1.2.4)
# Reviewers: Assigned automatically
# =============================================================================

version: 2

updates:
  # ---------------------------------------------------------------------------
  # Python Dependencies (requirements.txt)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "rag-enterprise-team"
    assignees:
      - "rag-enterprise-team"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    # Auto-merge patch updates
    # Requires GitHub Actions workflow to handle auto-merge
    versioning-strategy: increase

  # ---------------------------------------------------------------------------
  # Docker Dependencies (Dockerfile base images)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "rag-enterprise-team"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"

  # ---------------------------------------------------------------------------
  # GitHub Actions Dependencies
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "rag-enterprise-team"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions):"

# =============================================================================
# Notes
# =============================================================================
# Auto-merge Strategy:
#   - Patch updates (1.2.3 → 1.2.4): Auto-merge after CI passes
#   - Minor updates (1.2.0 → 1.3.0): Require manual review
#   - Major updates (1.0.0 → 2.0.0): Require manual review + testing
#
# To enable auto-merge, create GitHub Actions workflow:
#   .github/workflows/auto-merge.yml
#
# Security:
#   - All updates run through full CI pipeline
#   - Security vulnerabilities get priority labels
#   - Critical updates can be expedited
# =============================================================================
