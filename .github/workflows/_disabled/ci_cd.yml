name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**', 'claude/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # Basic Tests
  # ===========================================================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements_crawler.txt || true
        pip install pytest pytest-cov black isort mypy || true

    - name: Run linters (continue on error)
      continue-on-error: true
      run: |
        echo "Running linters..."
        black --check src/ app/ agents/ || echo "Black formatting issues found"
        isort --check-only src/ app/ agents/ || echo "Isort issues found"
        mypy src/ || echo "Mypy type issues found"

    - name: Run tests
      continue-on-error: true
      run: |
        echo "Running tests..."
        pytest tests/ --cov=src --cov-report=term-missing -v || echo "Some tests failed"

    - name: Summary
      if: always()
      run: |
        echo "✅ CI pipeline completed"
        echo "📊 Check logs above for any issues"

  # ===========================================================================
  # Security Scan (Basic)
  # ===========================================================================
  security:
    name: Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Run Bandit security check
      continue-on-error: true
      run: |
        pip install bandit[toml]
        bandit -r src/ app/ agents/ --exit-zero || echo "Security issues found"

    - name: Check dependencies
      continue-on-error: true
      run: |
        pip install safety
        safety check || echo "Dependency vulnerabilities found"

# ===========================================================================
# Simplified CI/CD Pipeline
# ===========================================================================
# Features:
#   - Python 3.11 testing
#   - Linting (black, isort, mypy)
#   - Security scanning (bandit, safety)
#   - All jobs continue on error (non-blocking)
#
# Triggers:
#   - Push to main, develop, feature/*, claude/*
#   - Pull requests to main, develop
#
# Note: This is a simplified version focused on essential checks.
#       For production deployment, add deployment jobs as needed.
# ===========================================================================
