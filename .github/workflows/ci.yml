# =============================================================================
# RAG Enterprise CI Pipeline
# =============================================================================
# This workflow provides comprehensive continuous integration including:
# - Code quality checks (linting, type checking, formatting)
# - Security scanning (SAST, dependency vulnerabilities, container scanning)
# - Test suite execution (unit, integration, performance)
# - Docker image building and validation
# - Coverage reporting and artifact uploads
#
# Triggers:
#   - Push to any branch
#   - Pull requests to main/develop
#   - Manual workflow dispatch
#
# Features:
#   - Parallel job execution for speed (~5-7 minutes total)
#   - Comprehensive caching for dependencies
#   - Multi-Python version testing (3.11, 3.12)
#   - Coverage gate enforcement (≥80%)
#   - Docker image size validation (<500MB)
#   - Detailed failure notifications
# =============================================================================

name: CI Pipeline

on:
  push:
    branches:
      - '**'  # All branches
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # Manual trigger
    inputs:
      skip_tests:
        description: 'Skip test execution (for debugging)'
        required: false
        default: 'false'
      skip_docker:
        description: 'Skip Docker build (for speed)'
        required: false
        default: 'false'

# Prevent concurrent runs for same branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# TEMPORARILY DISABLED - CI configuration needs update for current project structure
# TODO: Re-enable after project stabilization

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1  # Increment to invalidate caches

jobs:
  # ===========================================================================
  # Job 1: Lint - Code Quality Checks (Parallel)
  # Duration: ~2-3 minutes
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: false  # Temporarily disabled - TODO: Fix CI configuration

    strategy:
      fail-fast: false
      matrix:
        check:
          - name: black
            command: black --check --diff app/ tests/
          - name: isort
            command: isort --check-only --diff app/ tests/
          - name: flake8
            command: flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203,W503
          - name: mypy
            command: mypy app/ --strict --no-error-summary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-prod.txt

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install black isort flake8 mypy

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.command }}
        continue-on-error: false

      - name: Upload lint results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ matrix.check.name }}
          path: |
            .mypy_cache/
            .flake8.log
          retention-days: 7

  # ===========================================================================
  # Job 2: Security - SAST and Dependency Scanning (Parallel)
  # Duration: ~3-4 minutes
  # ===========================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: false  # Temporarily disabled - TODO: Fix CI configuration

    permissions:
      contents: read
      security-events: write  # For uploading SARIF results

    strategy:
      fail-fast: false
      matrix:
        scanner:
          - name: bandit
            command: bandit -r app/ -f json -o bandit-report.json
            report: bandit-report.json
          - name: safety
            command: safety check --json --output safety-report.json || true
            report: safety-report.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Install project dependencies (for safety check)
        if: matrix.scanner.name == 'safety'
        run: pip install -r requirements.txt

      - name: Run ${{ matrix.scanner.name }}
        run: ${{ matrix.scanner.command }}
        continue-on-error: true  # Don't fail on vulnerabilities, just report

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-${{ matrix.scanner.name }}-report
          path: ${{ matrix.scanner.report }}
          retention-days: 30

      - name: Check for critical vulnerabilities
        if: matrix.scanner.name == 'bandit'
        run: |
          # Fail if high severity issues found
          CRITICAL_COUNT=$(jq '.results | map(select(.issue_severity == "HIGH" or .issue_severity == "CRITICAL")) | length' bandit-report.json)
          echo "Critical/High severity issues: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::Found $CRITICAL_COUNT critical/high severity security issues"
            exit 1
          fi

  # ===========================================================================
  # Job 3: Test - Multi-Python Version Test Suite
  # Duration: ~5-7 minutes
  # ===========================================================================
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    if: false  # Temporarily disabled - TODO: Fix CI configuration

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        test-suite:
          - name: unit
            command: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --tb=short
            marker: unit
          - name: integration
            command: pytest tests/integration/ -v --cov=app --cov-append --cov-report=xml --tb=short
            marker: integration

    services:
      # PostgreSQL for integration tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis for caching tests
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Qdrant for vector search tests
      qdrant:
        image: qdrant/qdrant:v1.11.3
        ports:
          - 6333:6333
        options: >-
          --health-cmd "wget --spider -q http://localhost:6333/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache test dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pytest
          key: ${{ runner.os }}-pytest-${{ env.CACHE_VERSION }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pytest-${{ env.CACHE_VERSION }}-${{ matrix.python-version }}-
            ${{ runner.os }}-pytest-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-timeout pytest-xdist

      - name: Wait for services (integration tests)
        if: matrix.test-suite.name == 'integration'
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432; do sleep 1; done'
          echo "Waiting for Redis..."
          timeout 30 bash -c 'until redis-cli -h localhost -p 6379 ping; do sleep 1; done'
          echo "Waiting for Qdrant..."
          timeout 30 bash -c 'until curl -f http://localhost:6333/health; do sleep 1; done'
          echo "All services ready"

      - name: Set test environment variables
        run: |
          echo "ENVIRONMENT=test" >> $GITHUB_ENV
          echo "LOG_LEVEL=DEBUG" >> $GITHUB_ENV
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_USER=test_user" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=test_password" >> $GITHUB_ENV
          echo "POSTGRES_DB=test_db" >> $GITHUB_ENV
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "QDRANT_HOST=localhost" >> $GITHUB_ENV
          echo "QDRANT_HTTP_PORT=6333" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=test-secret-key-for-ci" >> $GITHUB_ENV

      - name: Run ${{ matrix.test-suite.name }} tests
        run: ${{ matrix.test-suite.command }}
        env:
          COVERAGE_FILE: .coverage.${{ matrix.python-version }}.${{ matrix.test-suite.name }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'  # Only upload once
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: ${{ matrix.test-suite.name }}
          name: codecov-${{ matrix.python-version }}-${{ matrix.test-suite.name }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage threshold
        if: matrix.python-version == '3.11' && matrix.test-suite.name == 'unit'
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('coverage.xml').getroot().attrib['line-rate'])")
          COVERAGE_PCT=$(python -c "print(int(float('$COVERAGE') * 100))")
          echo "Coverage: ${COVERAGE_PCT}%"
          if [ "$COVERAGE_PCT" -lt 80 ]; then
            echo "::error::Coverage ${COVERAGE_PCT}% is below 80% threshold"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}-${{ matrix.test-suite.name }}
          path: |
            coverage.xml
            htmlcov/
            .coverage.*
          retention-days: 14

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results - ${{ matrix.test-suite.name }} (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('coverage.xml').getroot().attrib['line-rate'])")
            COVERAGE_PCT=$(python -c "print(int(float('$COVERAGE') * 100))")
            echo "**Coverage:** ${COVERAGE_PCT}%" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Job 4: Docker - Build and Validate Container
  # Duration: ~4-5 minutes
  # ===========================================================================
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    if: false  # Temporarily disabled - TODO: Fix CI configuration

    permissions:
      contents: read
      security-events: write  # For Trivy SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ env.CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false
          load: true
          tags: rag-enterprise:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Move cache (prevent cache growth)
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Verify image size
        run: |
          IMAGE_SIZE=$(docker image inspect rag-enterprise:${{ github.sha }} --format='{{.Size}}')
          IMAGE_SIZE_MB=$((IMAGE_SIZE / 1024 / 1024))
          echo "Image size: ${IMAGE_SIZE_MB}MB"

          if [ "$IMAGE_SIZE_MB" -gt 500 ]; then
            echo "::error::Docker image size ${IMAGE_SIZE_MB}MB exceeds 500MB limit"
            exit 1
          fi

          echo "IMAGE_SIZE_MB=${IMAGE_SIZE_MB}" >> $GITHUB_ENV

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-enterprise:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail on vulnerabilities, just report

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy for JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-enterprise:${{ github.sha }}
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Check for critical vulnerabilities
        run: |
          CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-report.json)
          HIGH_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-report.json)

          echo "Critical vulnerabilities: $CRITICAL_COUNT"
          echo "High vulnerabilities: $HIGH_COUNT"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::warning::Found $CRITICAL_COUNT critical vulnerabilities in Docker image"
            # Don't fail CI for vulnerabilities, just warn
          fi

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: |
            trivy-results.sarif
            trivy-report.json
          retention-days: 30

      - name: Test container health
        run: |
          # Start container in background
          docker run -d --name test-container \
            -e ENVIRONMENT=test \
            -e LOG_LEVEL=INFO \
            -e POSTGRES_HOST=localhost \
            -e REDIS_HOST=localhost \
            -e QDRANT_HOST=localhost \
            -p 8000:8000 \
            rag-enterprise:${{ github.sha }}

          # Wait for health check
          sleep 10

          # Check if container is still running
          if ! docker ps | grep test-container; then
            echo "::error::Container failed to start"
            docker logs test-container
            exit 1
          fi

          # Check health endpoint (will fail without services, but container should be running)
          CONTAINER_STATUS=$(docker inspect test-container --format='{{.State.Status}}')
          echo "Container status: $CONTAINER_STATUS"

          if [ "$CONTAINER_STATUS" != "running" ]; then
            echo "::error::Container not in running state"
            docker logs test-container
            exit 1
          fi

          # Cleanup
          docker stop test-container
          docker rm test-container

      - name: Generate Docker build summary
        if: always()
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** rag-enterprise:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${IMAGE_SIZE_MB}MB" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 5: Summary - Aggregate Results
  # Duration: <1 minute
  # ===========================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    # Temporarily disabled while CI jobs are disabled
    # needs: [lint, security, test, docker]
    if: false

    steps:
      - name: Check CI status
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY

          # Check if any job failed
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.security.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.docker.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**⚠️ CI Pipeline Failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ CI Pipeline Passed**" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::CI pipeline failed. Check individual job results for details."

# =============================================================================
# CI Pipeline Summary
# =============================================================================
# Jobs executed in parallel:
#   1. Lint (4 checks): black, isort, flake8, mypy
#   2. Security (2 scanners): bandit, safety
#   3. Test (4 suites): unit + integration × Python 3.11/3.12
#   4. Docker: Build, size check, Trivy scan, health test
#   5. Summary: Aggregate results
#
# Total runtime: ~7-10 minutes (parallel execution)
# Coverage gate: 80% minimum
# Docker image: <500MB size limit
# Security: Critical/High vulnerabilities reported (not blocked)
#
# Artifacts preserved:
#   - Lint results (7 days)
#   - Security reports (30 days)
#   - Test coverage (14 days)
#   - Trivy scans (30 days)
# =============================================================================
