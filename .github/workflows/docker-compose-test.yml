name: Docker Compose Integration Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-docker-compose:
    name: Test Full Stack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: docker-compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30
          docker-compose ps

      - name: Check API health
        run: |
          max_attempts=30
          attempt=0
          until curl -f http://localhost:8001/health/live || [ $attempt -eq $max_attempts ]; do
            echo "Waiting for API... ($attempt/$max_attempts)"
            sleep 2
            attempt=$((attempt + 1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "❌ API failed to start"
            docker-compose logs api
            exit 1
          fi

          echo "✅ API is healthy"

      - name: Run integration tests
        run: |
          # Test search endpoint
          curl -X POST http://localhost:8001/api/v1/search \
            -H "Content-Type: application/json" \
            -d '{"query":"test","top_k":5}' || echo "Search test failed"

          # Test analytics endpoint
          curl http://localhost:8001/api/v1/analytics/realtime/health || echo "Analytics test failed"

          echo "✅ Integration tests complete"

      - name: Check service logs
        if: failure()
        run: docker-compose logs

      - name: Cleanup
        if: always()
        run: docker-compose down -v
