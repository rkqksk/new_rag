# =============================================================================
# RAG Enterprise Security Scanning
# =============================================================================
# Lightweight security scanning for PRs and manual runs
#
# Triggers:
#   - Pull requests to main/develop (basic scan)
#   - Manual dispatch (full scan options)
#
# Scans:
#   - SAST: Bandit Python security linter
#   - Dependencies: Safety vulnerability check
#
# Note: All checks use continue-on-error for non-blocking scans
# =============================================================================

name: Security Scan

on:
  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan'
        required: false
        type: choice
        options:
          - basic
          - full
        default: 'basic'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # SAST - Static Application Security Testing
  # ===========================================================================
  sast:
    name: Security SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        continue-on-error: true
        run: |
          echo "Running Bandit SAST scan..."
          bandit -r src/ app/ agents/ scripts/ \
            -f json -o bandit-report.json \
            --exit-zero \
            --confidence-level medium \
            --severity-level medium || echo "Bandit scan completed"

      - name: Generate SARIF report
        continue-on-error: true
        run: |
          bandit -r src/ app/ agents/ scripts/ \
            -f sarif -o bandit.sarif \
            --exit-zero \
            --confidence-level medium \
            --severity-level medium || echo "SARIF generation completed"

      - name: Upload SARIF to GitHub Security
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

      - name: Display results summary
        if: always()
        run: |
          if [ -f bandit-report.json ]; then
            echo "✅ Bandit scan completed"
            echo "📊 Check GitHub Security tab for details"
          else
            echo "⚠️ Bandit report not generated"
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: |
            bandit-report.json
            bandit.sarif
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Dependency Vulnerability Scanning
  # ===========================================================================
  dependencies:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install safety pip-audit

      - name: Run Safety check
        continue-on-error: true
        run: |
          echo "Running Safety dependency check..."
          safety check --json --output safety-report.json || echo "Safety check completed"
          safety check || echo "Some vulnerabilities found"

      - name: Run pip-audit
        continue-on-error: true
        run: |
          echo "Running pip-audit..."
          pip-audit --desc --format json --output pip-audit.json || echo "pip-audit completed"

      - name: Display results summary
        if: always()
        run: |
          echo "✅ Dependency scan completed"
          echo "📊 Review artifact for details"

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: |
            safety-report.*
            pip-audit.json
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast, dependencies]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Bandit) | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependencies.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security scan completed. Check artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY

# =============================================================================
# Security Scanning Configuration
# =============================================================================
# Features:
#   - Lightweight scans on PRs
#   - SAST with Bandit
#   - Dependency checks with Safety and pip-audit
#   - All checks continue on error (non-blocking)
#   - Results uploaded as artifacts (30 days retention)
#   - SARIF reports to GitHub Security tab
#
# Manual Triggers:
#   - Go to Actions tab → Security Scan → Run workflow
#   - Choose scan type: basic or full
#
# Results:
#   - GitHub Security tab (Code scanning alerts)
#   - Workflow artifacts (detailed JSON reports)
#   - Job summary (quick overview)
#
# Note: This is a simplified security setup. For production:
#   - Add scheduled scans (weekly/monthly)
#   - Add container scanning (Trivy)
#   - Add secret scanning (GitLeaks)
#   - Configure alerting (Slack, email)
# =============================================================================
