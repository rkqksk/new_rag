site_name: RAG Enterprise Documentation
site_description: Complete documentation for RAG Enterprise Platform
site_author: RAG Enterprise Team
repo_url: https://github.com/rkqksk/new_rag
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
  - Features:
    - v6.0.0 Features: features/v6.md
    - v7.0.0 Features: features/v7.md
    - API Reference: features/api.md
  - Guides:
    - CI/CD Pipeline: guides/cicd.md
    - Security: guides/security.md
    - Observability: guides/observability.md
    - Data Platform: guides/data-platform.md
  - API:
    - REST API: api/rest.md
    - GraphQL API: api/graphql.md
    - Authentication: api/auth.md
